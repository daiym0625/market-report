<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vercel Deploy Helper</title>
<style>
body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
#log { white-space: pre-wrap; font-size: 13px; }
.ok { color: #4ec9b0; } .err { color: #f48771; } .info { color: #9cdcfe; }
button { padding: 10px 20px; background: #0070f3; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; margin: 8px 4px; }
button:disabled { opacity: 0.5; }
</style>
</head>
<body>
<h2 style="color:#fff">Vercel Deploy Helper — q2-gtm-app5</h2>
<button id="deployBtn" onclick="deploy()">🚀 Deploy to Production</button>
<button onclick="checkStatus()">📊 Check Current Status</button>
<div id="log"></div>
<script>
const TOKEN = 'vca_8nyP9Gprxr4WCqaJalnmRroepMxqyVfMtSK7Q6MhINUHqyB3ib4MpSNP';
const PROJECT_ID = 'prj_JeZ5ErshS1jo84BykxF7uwJSGZBh';
const TEAM_ID = 'team_mos9TZ44AdoHEgX1S1V41a8H';

function log(msg, cls='info') {
  const el = document.getElementById('log');
  el.innerHTML += `<span class="${cls}">${new Date().toLocaleTimeString()} ${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

async function sha1(str) {
  const buf = new TextEncoder().encode(str);
  const hashBuf = await crypto.subtle.digest('SHA-1', buf);
  return Array.from(new Uint8Array(hashBuf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

const FILES = {
  'package.json': `{"name":"drfone-market-analysis","version":"1.0.0","scripts":{"dev":"vite","build":"vite build","preview":"vite preview"},"dependencies":{"react":"^18.3.1","react-dom":"^18.3.1","recharts":"^2.13.3"},"devDependencies":{"@types/react":"^18.3.1","@types/react-dom":"^18.3.1","@vitejs/plugin-react":"^4.3.4","typescript":"^5.6.3","vite":"^6.0.5"}}`,
  'index.html': `<!doctype html>\n<html lang="zh-CN">\n  <head>\n    <meta charset="UTF-8" />\n    <meta name="viewport" content="width=device-width, initial-scale=1.0" />\n    <title>Dr.Fone 产品规划市场洞察</title>\n  </head>\n  <body>\n    <div id="root"></div>\n    <script type="module" src="/src/main.tsx"><\/script>\n  </body>\n</html>`,
  'vite.config.ts': `import { defineConfig } from 'vite';\nimport react from '@vitejs/plugin-react';\nexport default defineConfig({ plugins: [react()] });`,
  'tsconfig.json': `{"compilerOptions":{"target":"ES2020","useDefineForClassFields":true,"lib":["ES2020","DOM","DOM.Iterable"],"module":"ESNext","skipLibCheck":true,"moduleResolution":"bundler","allowImportingTsExtensions":true,"isolatedModules":true,"moduleDetection":"force","noEmit":true,"jsx":"react-jsx","strict":true},"include":["src"]}`,
  'src/index.css': `*, *::before, *::after { box-sizing: border-box; }\nbody {\n  margin: 0;\n  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;\n  font-size: 14px; color: #1a1a1a; background: #f5f5f5;\n}\ntable { border-collapse: collapse; width: 100%; }\nth, td { padding: 8px 12px; border-bottom: 1px solid #e8e8e8; }\nth { background: #fafafa; font-weight: 600; font-size: 13px; }\ntr:last-child td { border-bottom: none; }\nh1 { font-size: 22px; font-weight: 700; margin: 0; }\nh2 { font-size: 17px; font-weight: 600; margin: 0; }\nh3 { font-size: 15px; font-weight: 600; margin: 0; }\nhr { border: none; border-top: 1px solid #e8e8e8; margin: 0; }\nstrong { font-weight: 600; }`,
  'src/main.tsx': `import { StrictMode } from 'react';\nimport { createRoot } from 'react-dom/client';\nimport App from './App';\nimport './index.css';\ncreateRoot(document.getElementById('root')!).render(<StrictMode><App /></StrictMode>);`,
};

async function checkStatus() {
  log('检查部署状态...', 'info');
  try {
    const r = await fetch(`https://api.vercel.com/v6/deployments?projectId=${PROJECT_ID}&teamId=${TEAM_ID}&limit=3`, {
      headers: { Authorization: `Bearer ${TOKEN}` }
    });
    const d = await r.json();
    if (d.deployments) {
      d.deployments.forEach(dep => {
        log(`  [${dep.state}] ${dep.url} — ${new Date(dep.createdAt).toLocaleString()}`, dep.state === 'READY' ? 'ok' : 'info');
      });
    } else {
      log(JSON.stringify(d).substring(0, 300), 'err');
    }
  } catch(e) {
    log('状态检查失败: ' + e.message, 'err');
  }
}

async function uploadFile(filename, content) {
  const hash = await sha1(content);
  log(`  上传 ${filename} (sha1: ${hash.substring(0,8)}...)`, 'info');
  const resp = await fetch(`https://api.vercel.com/v2/files?teamId=${TEAM_ID}`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${TOKEN}`,
      'Content-Type': 'application/octet-stream',
      'x-vercel-digest': hash,
      'Content-Length': new TextEncoder().encode(content).length,
    },
    body: content,
  });
  if (resp.status !== 200 && resp.status !== 201) {
    const t = await resp.text();
    throw new Error(`Upload ${filename} failed (${resp.status}): ${t.substring(0,200)}`);
  }
  return hash;
}

async function deploy() {
  const btn = document.getElementById('deployBtn');
  btn.disabled = true;
  log('=== 开始部署 q2-gtm-app5 到 Vercel ===', 'ok');

  try {
    // 1. 获取 App.tsx 内容 (需要从本地文件读取)
    log('正在获取 App.tsx 内容...', 'info');
    let appTsx;
    try {
      const r = await fetch('file:///C:/Users/ws/q2-gtm-app5/src/App.tsx');
      appTsx = await r.text();
      log(`  App.tsx 读取成功 (${appTsx.length} 字节)`, 'ok');
    } catch(e) {
      log('  无法读取本地文件，尝试使用内嵌版本...', 'err');
      log('  请刷新页面或使用本地 server 提供文件', 'err');
      btn.disabled = false;
      return;
    }

    FILES['src/App.tsx'] = appTsx;

    // 2. 上传所有文件
    log('上传源文件...', 'info');
    const filesList = [];
    for (const [filename, content] of Object.entries(FILES)) {
      const hash = await uploadFile(filename, content);
      filesList.push({ file: filename, sha: hash, size: new TextEncoder().encode(content).length });
    }

    // 3. 创建部署
    log('创建 Vercel 部署...', 'info');
    const deployResp = await fetch(`https://api.vercel.com/v13/deployments?teamId=${TEAM_ID}`, {
      method: 'POST',
      headers: {
        Authorization: `Bearer ${TOKEN}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        name: 'q2-gtm-app5',
        files: filesList,
        projectSettings: {
          framework: 'vite',
          buildCommand: null,
          outputDirectory: null,
          installCommand: null,
          devCommand: null,
        },
        target: 'production',
      }),
    });

    const deployData = await deployResp.json();
    if (deployData.error) {
      log('部署失败: ' + JSON.stringify(deployData.error), 'err');
    } else {
      log(`部署创建成功！`, 'ok');
      log(`  部署 ID: ${deployData.id}`, 'ok');
      log(`  URL: https://${deployData.url}`, 'ok');
      log(`  状态: ${deployData.readyState || deployData.status}`, 'ok');
      
      // 轮询等待部署完成
      if (deployData.id) {
        log('等待部署完成...', 'info');
        await pollDeployment(deployData.id);
      }
    }
  } catch(e) {
    log('部署过程发生错误: ' + e.message, 'err');
    log('错误详情: ' + e.stack, 'err');
  }
  btn.disabled = false;
}

async function pollDeployment(deployId) {
  for (let i = 0; i < 30; i++) {
    await new Promise(r => setTimeout(r, 5000));
    try {
      const r = await fetch(`https://api.vercel.com/v13/deployments/${deployId}?teamId=${TEAM_ID}`, {
        headers: { Authorization: `Bearer ${TOKEN}` }
      });
      const d = await r.json();
      log(`  状态: ${d.readyState || d.status}`, d.readyState === 'READY' ? 'ok' : 'info');
      if (d.readyState === 'READY' || d.readyState === 'ERROR') {
        if (d.readyState === 'READY') {
          log(`🎉 部署完成！在线地址: https://${d.url}`, 'ok');
          log(`📱 生产地址: https://q2-gtm-app5.vercel.app`, 'ok');
        } else {
          log('部署失败，请检查 Vercel 控制台', 'err');
        }
        break;
      }
    } catch(e) {
      log('轮询出错: ' + e.message, 'err');
    }
  }
}
</script>
</body>
</html>
